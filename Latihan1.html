<!DOCTYPE html>
<html lang="id"
    <head>
        <meta charset="UTF-8">
        <title>Kucing Hitam</title>
        <style>
            /* Menagtur warna tulisan yang berbeda untuk seluruh halaman */
            body {
                font-family: Arial, Helvetica, sans-serif;
                color:darkcyan
            }

            /* Memindahkan posisi tulisan BIODATA ke tengah */
            .judul-container {
                background-color: #f3f3f3; /* warna background untuk judul */
                padding: 10px;
                text-align: center;
            }

            /* Memisahkan isi halaman dengan background berbeda menggunakan <div> */
                .konten-container {
                    background-color: blueviolet;
                    padding: 20px;
                } 

                /* Menebalkan tulisan NIM, Nama dan Usia */
                .label {
                    font-weight: bold;
                }

                /* Memberikan warna berbeda pada teks tertentu */
                .highlight-text {
                    color: red;
                }

                /* Style untuk span pemisah nama */
                .nama-depan {
                    color: skyblue;
                } 
                .nama-belakang {
                    color: yellow;
                }
        </style>
    </head>
    <body>

        <div class="judul-contaier">
            <h1>BIODATA </h1>
        </div>

        <div class="konten-container">
            <p class="highlight-text">
                <span class="label">Nama:</span>

                <span class="nama-depan">Muhamad Daniel</span>
                <span class="nama-belakang">Alfa Rizie</span>
            </p>

            <p class="highlight-text">
                <span class="label">NIM:</span> 124005005
            </p>

            <p class="highlight-text">
                <span class="label">Usia:</span> 21 Tahun
            </p>
        </div>

    </body>
    </html>
